apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: eventpulse-require-security-context
  annotations:
    policies.kyverno.io/title: Require Hardened Security Context
    policies.kyverno.io/category: EventPulse
    policies.kyverno.io/severity: high
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: require-container-hardening
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - eventpulse
              selector:
                matchExpressions:
                  - key: app.kubernetes.io/component
                    operator: In
                    values:
                      - api
                      - migration
                      - seed
                      - test
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kyverno
                - kube-public
                - kube-node-lease
      validate:
        failureAction: Audit
        message: "EventPulse containers must disable privilege escalation, avoid privileged mode, and drop all Linux capabilities."
        pattern:
          spec:
            securityContext:
              seccompProfile:
                type: RuntimeDefault
            containers:
              - securityContext:
                  allowPrivilegeEscalation: false
                  privileged: false
                  capabilities:
                    drop:
                      - ALL
