apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: eventpulse-require-image-digest
  annotations:
    policies.kyverno.io/title: Require Image Digests
    policies.kyverno.io/category: EventPulse
    policies.kyverno.io/severity: high
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: require-sha256-digest
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - eventpulse
              selector:
                matchExpressions:
                  - key: app.kubernetes.io/component
                    operator: In
                    values:
                      - api
                      - migration
                      - seed
                      - test
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kyverno
                - kube-public
                - kube-node-lease
      validate:
        failureAction: Audit
        message: "EventPulse workload images must be pinned by immutable sha256 digest."
        pattern:
          spec:
            containers:
              - image: "*@sha256:*"
