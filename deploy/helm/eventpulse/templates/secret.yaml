{{- if .Values.database.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "eventpulse.secretName" . }}
  labels:
    {{- include "eventpulse.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.database.secret.passwordKey }}: {{ .Values.database.secret.password | quote }}
{{- end }}
