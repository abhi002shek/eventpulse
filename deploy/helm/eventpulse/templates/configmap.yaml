apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "eventpulse.fullname" . }}-config
  labels:
    {{- include "eventpulse.labels" . | nindent 4 }}
data:
  EVENTPULSE_APP_NAME: {{ .Values.config.appName | quote }}
  EVENTPULSE_SERVICE_NAME: {{ .Values.config.serviceName | quote }}
  EVENTPULSE_ENVIRONMENT: {{ .Values.config.environment | quote }}
  EVENTPULSE_LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  DATABASE_HOST: {{ .Values.database.host | quote }}
  DATABASE_PORT: {{ .Values.database.port | quote }}
  DATABASE_NAME: {{ .Values.database.name | quote }}
  PGSSLMODE: {{ .Values.database.sslMode | quote }}
  {{- if not (include "eventpulse.databaseUsernameKey" .) }}
  DATABASE_USER: {{ .Values.database.user | quote }}
  {{- end }}
