{{- if and .Values.networkPolicy.enabled .Values.postgresql.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "eventpulse.fullname" . }}-postgres
  labels:
    {{- include "eventpulse.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "eventpulse.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgres
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app.kubernetes.io/component
                operator: In
                values:
                  - api
                  - migration
                  - seed
      ports:
        - protocol: TCP
          port: 5432
  egress: []
{{- end }}
