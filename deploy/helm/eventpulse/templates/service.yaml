apiVersion: v1
kind: Service
metadata:
  name: {{ include "eventpulse.fullname" . }}
  labels:
    {{- include "eventpulse.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "eventpulse.apiSelectorLabels" . | nindent 4 }}
