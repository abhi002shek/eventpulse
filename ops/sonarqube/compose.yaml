name: eventpulse-sonarqube

services:
  sonar-db:
    image: postgres:16.14-alpine3.24@sha256:7a396fd264a2067788b6551122b50f162bf6136312c7fc9d74381cb92c648382
    platform: linux/amd64
    restart: unless-stopped
    shm_size: 256mb
    environment:
      POSTGRES_DB: ${SONAR_DB_NAME}
      POSTGRES_USER: ${SONAR_DB_USER}
      POSTGRES_PASSWORD: ${SONAR_DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    volumes:
      - sonar_db_data:/var/lib/postgresql/data
    networks:
      - sonar_internal

  sonarqube:
    image: sonarqube:26.7.0.124771-community@sha256:5a40959752dcc1e1408ff18d8ce35be30711323ed5612d3a49d65e093dc34454
    platform: linux/amd64
    restart: unless-stopped
    depends_on:
      sonar-db:
        condition: service_healthy
    ports:
      - "127.0.0.1:9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/${SONAR_DB_NAME}
      SONAR_JDBC_USERNAME: ${SONAR_DB_USER}
      SONAR_JDBC_PASSWORD: ${SONAR_DB_PASSWORD}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/9000; printf \"GET /api/system/status HTTP/1.1\\r\\nHost: 127.0.0.1\\r\\nConnection: close\\r\\n\\r\\n\" >&3; grep -q \"HTTP/1.1 200\" <&3'",
        ]
      interval: 15s
      timeout: 5s
      retries: 40
      start_period: 90s
    stop_grace_period: 2m
    security_opt:
      - no-new-privileges:true
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    networks:
      - sonar_internal

networks:
  sonar_internal:
    driver: bridge

volumes:
  sonar_db_data:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:
