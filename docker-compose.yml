services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: eventpulse
      POSTGRES_USER: eventpulse
      POSTGRES_PASSWORD: eventpulse_dev_password
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventpulse -d eventpulse"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
