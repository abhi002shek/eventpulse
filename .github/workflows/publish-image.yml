name: Publish Secure Image

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        description: Optional demonstration version such as v0.1.0
        required: false
        type: string

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build, Scan, Publish, Sign, and Verify
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: abhi002shek/eventpulse
      IMAGE_TITLE: EventPulse API
      IMAGE_DESCRIPTION: Secure FastAPI event-booking API for the EventPulse learning project
      IMAGE_LICENSES: MIT
      SBOM_FILE: eventpulse-sbom.spdx.json
      COSIGN_YES: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image metadata
        id: meta
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          sha_tag="sha-${GITHUB_SHA}"
          version_tag=""

          validate_version_tag() {
            local candidate="$1"
            if [[ ! "${candidate}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Version tag must match vMAJOR.MINOR.PATCH, for example v0.1.0." >&2
              exit 1
            fi
          }

          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            validate_version_tag "${RELEASE_TAG}"
            version_tag="${RELEASE_TAG}"
          elif [[ -n "${REQUESTED_VERSION}" ]]; then
            validate_version_tag "${REQUESTED_VERSION}"
            version_tag="${REQUESTED_VERSION}"
          fi

          image_repo="${REGISTRY}/${IMAGE_NAME}"
          created="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"

          {
            echo "sha_tag=${sha_tag}"
            echo "version_tag=${version_tag}"
            echo "image_repo=${image_repo}"
            echo "image_ref_sha=${image_repo}:${sha_tag}"
            echo "created=${created}"
          } >>"${GITHUB_OUTPUT}"

      - name: Build image once
        env:
          IMAGE_REF_SHA: ${{ steps.meta.outputs.image_ref_sha }}
          CREATED: ${{ steps.meta.outputs.created }}
        run: |
          set -euo pipefail

          docker buildx build \
            --pull \
            --load \
            --tag "${IMAGE_REF_SHA}" \
            --label "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "org.opencontainers.image.created=${CREATED}" \
            --label "org.opencontainers.image.title=${IMAGE_TITLE}" \
            --label "org.opencontainers.image.description=${IMAGE_DESCRIPTION}" \
            --label "org.opencontainers.image.licenses=${IMAGE_LICENSES}" \
            .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: ${{ steps.meta.outputs.image_ref_sha }}
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: "true"
          format: table
          exit-code: "1"
          cache: "false"
          version: v0.70.0

      - name: Push approved image
        id: push
        env:
          IMAGE_REF_SHA: ${{ steps.meta.outputs.image_ref_sha }}
          IMAGE_REPO: ${{ steps.meta.outputs.image_repo }}
          VERSION_TAG: ${{ steps.meta.outputs.version_tag }}
        run: |
          set -euo pipefail

          docker push "${IMAGE_REF_SHA}"
          digest="$(docker buildx imagetools inspect "${IMAGE_REF_SHA}" --format '{{ .Manifest.Digest }}')"

          if [[ ! "${digest}" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "Pushed digest is missing or invalid: ${digest}" >&2
            exit 1
          fi

          if [[ -n "${VERSION_TAG}" ]]; then
            version_ref="${IMAGE_REPO}:${VERSION_TAG}"
            docker tag "${IMAGE_REF_SHA}" "${version_ref}"
            docker push "${version_ref}"
            version_digest="$(docker buildx imagetools inspect "${version_ref}" --format '{{ .Manifest.Digest }}')"
            if [[ "${version_digest}" != "${digest}" ]]; then
              echo "Version tag digest does not match SHA tag digest." >&2
              exit 1
            fi
          fi

          digest_ref="${IMAGE_REPO}@${digest}"

          {
            echo "digest=${digest}"
            echo "digest_ref=${digest_ref}"
          } >>"${GITHUB_OUTPUT}"

      - name: Generate SPDX SBOM for pushed digest
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ steps.push.outputs.digest_ref }}
          format: spdx-json
          output-file: ${{ env.SBOM_FILE }}
          upload-artifact: false

      - name: Verify SBOM file
        run: |
          set -euo pipefail
          test -s "${SBOM_FILE}"
          python -m json.tool "${SBOM_FILE}" >/dev/null

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: eventpulse-sbom-spdx-json
          path: ${{ env.SBOM_FILE }}
          retention-days: 30
          if-no-files-found: error

      - name: Create GitHub build provenance
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3.0.0
        with:
          subject-name: ${{ steps.meta.outputs.image_repo }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image digest with Cosign keyless signing
        env:
          DIGEST_REF: ${{ steps.push.outputs.digest_ref }}
        run: |
          set -euo pipefail
          cosign sign --yes "${DIGEST_REF}"

      - name: Verify Cosign signature
        env:
          DIGEST_REF: ${{ steps.push.outputs.digest_ref }}
          EXPECTED_IDENTITY_REGEXP: ^https://github\.com/abhi002shek/eventpulse/\.github/workflows/publish-image\.yml@refs/(heads/main|tags/.+)$
          EXPECTED_ISSUER: https://token.actions.githubusercontent.com
        run: |
          set -euo pipefail
          cosign verify \
            --certificate-identity-regexp "${EXPECTED_IDENTITY_REGEXP}" \
            --certificate-oidc-issuer "${EXPECTED_ISSUER}" \
            "${DIGEST_REF}"

      - name: Pull and inspect signed digest
        id: runtime
        env:
          IMAGE_REF_SHA: ${{ steps.meta.outputs.image_ref_sha }}
          IMAGE_REPO: ${{ steps.meta.outputs.image_repo }}
          VERSION_TAG: ${{ steps.meta.outputs.version_tag }}
          DIGEST_REF: ${{ steps.push.outputs.digest_ref }}
        run: |
          set -euo pipefail

          docker image rm "${IMAGE_REF_SHA}" "${DIGEST_REF}" 2>/dev/null || true
          if [[ -n "${VERSION_TAG}" ]]; then
            docker image rm "${IMAGE_REPO}:${VERSION_TAG}" 2>/dev/null || true
          fi

          docker pull "${DIGEST_REF}"

          configured_user="$(docker image inspect "${DIGEST_REF}" --format '{{ .Config.User }}')"
          if [[ "${configured_user}" != "10001:10001" ]]; then
            echo "Unexpected configured image user: ${configured_user}" >&2
            exit 1
          fi

          docker run --rm --entrypoint sh "${DIGEST_REF}" -c '
            for path in /app/.env /app/.git /app/.venv /app/tests /app/coverage.xml; do
              test ! -e "$path"
            done
          '

          echo "configured_user=${configured_user}" >>"${GITHUB_OUTPUT}"

      - name: Write job summary
        env:
          IMAGE_REPO: ${{ steps.meta.outputs.image_repo }}
          SHA_TAG: ${{ steps.meta.outputs.sha_tag }}
          VERSION_TAG: ${{ steps.meta.outputs.version_tag }}
          DIGEST_REF: ${{ steps.push.outputs.digest_ref }}
          DIGEST: ${{ steps.push.outputs.digest }}
          CONFIGURED_USER: ${{ steps.runtime.outputs.configured_user }}
        run: |
          set -euo pipefail
          {
            echo "## EventPulse Secure Image"
            echo
            echo "- Image repository: \`${IMAGE_REPO}\`"
            echo "- SHA tag: \`${SHA_TAG}\`"
            if [[ -n "${VERSION_TAG}" ]]; then
              echo "- Version tag: \`${VERSION_TAG}\`"
            else
              echo "- Version tag: not published"
            fi
            echo "- Immutable digest reference: \`${DIGEST_REF}\`"
            echo "- Trivy result: passed HIGH/CRITICAL gate with ignore-unfixed policy"
            echo "- SBOM: \`${SBOM_FILE}\` in SPDX JSON format"
            echo "- GitHub provenance: created for digest \`${DIGEST}\`"
            echo "- Cosign signature: keyless signature created"
            echo "- Signature verification: passed with GitHub Actions OIDC identity constraints"
            echo "- Runtime user: \`${CONFIGURED_USER}\`"
            echo
            echo "### Consumer Verification"
            echo
            echo "\`\`\`bash"
            echo "docker pull ${DIGEST_REF}"
            echo "cosign verify \\\\"
            echo "  --certificate-identity-regexp '^https://github\\.com/abhi002shek/eventpulse/\\.github/workflows/publish-image\\.yml@refs/(heads/main|tags/.+)$' \\\\"
            echo "  --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \\\\"
            echo "  ${DIGEST_REF}"
            echo "\`\`\`"
          } >>"${GITHUB_STEP_SUMMARY}"
