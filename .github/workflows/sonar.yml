name: SonarQube

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonarqube-analysis:
    name: Test and SonarQube Analysis
    runs-on:
      - self-hosted
      - Linux
      - X64
      - eventpulse-sonar
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:16.14-alpine3.24@sha256:7a396fd264a2067788b6551122b50f162bf6136312c7fc9d74381cb92c648382
        env:
          POSTGRES_DB: eventpulse_test
          POSTGRES_USER: eventpulse
          POSTGRES_PASSWORD: eventpulse_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U eventpulse -d eventpulse_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    env:
      DATABASE_HOST: 127.0.0.1
      DATABASE_PORT: "5432"
      DATABASE_NAME: eventpulse_test
      DATABASE_USER: eventpulse
      DATABASE_PASSWORD: eventpulse_ci_password
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    steps:
      - name: Clean generated files from previous runs
        run: |
          rm -f coverage.xml .coverage
          find . -type d \( -name __pycache__ -o -name .pytest_cache \) -prune -exec rm -rf {} +

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run formatting, linting, and type checks
        run: |
          ruff format --check .
          ruff check .
          mypy app

      - name: Apply database migrations
        run: alembic upgrade head

      - name: Generate test coverage
        run: |
          pytest \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=70

      - name: Confirm coverage report exists
        run: test -s coverage.xml

      - name: Run SonarQube analysis
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
        with:
          args: >-
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=300

      - name: Clean generated files
        if: always()
        run: |
          rm -f coverage.xml .coverage
          find . -type d \( -name __pycache__ -o -name .pytest_cache -o -name .mypy_cache -o -name .ruff_cache \) -prune -exec rm -rf {} +
