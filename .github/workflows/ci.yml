name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-and-test:
    name: Quality, Test, and Image Build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: eventpulse_test
          POSTGRES_USER: eventpulse
          POSTGRES_PASSWORD: eventpulse_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U eventpulse -d eventpulse_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    env:
      DATABASE_HOST: 127.0.0.1
      DATABASE_PORT: "5432"
      DATABASE_NAME: eventpulse_test
      DATABASE_USER: eventpulse
      DATABASE_PASSWORD: eventpulse_ci_password
      IMAGE_TAG: eventpulse-api:${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run formatting, linting, and type checks
        run: |
          ruff format --check .
          ruff check .
          mypy app

      - name: Apply database migrations
        run: alembic upgrade head

      - name: Run tests
        run: |
          pytest \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=70

      - name: Build production image
        run: docker build --pull --tag "$IMAGE_TAG" .

      - name: Verify configured image user
        run: |
          configured_user="$(docker image inspect "$IMAGE_TAG" --format '{{ .Config.User }}')"
          test "$configured_user" = "10001:10001"

      - name: Verify excluded files are absent from image
        run: |
          docker run --rm --entrypoint sh "$IMAGE_TAG" -c '
            for path in /app/.env /app/.git /app/.venv /app/tests /app/coverage.xml; do
              test ! -e "$path"
            done
          '
